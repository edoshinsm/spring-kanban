<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kanban</title>
    <link href="https://cdn.jsdelivr.net/gh/microsoft/cascadia-code@master/dist/woff2/CascadiaCode.woff2" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            font-family: 'Cascadia Code', monospace;
        }
    </style>
</head>
<body class="h-screen m-0 flex flex-col overflow-hidden bg-gray-50">
<div class="flex flex-col min-h-screen">
    <div th:insert="~{fragments/header :: main-header}"></div>
    <div class="flex flex-1 overflow-hidden">
        <div class="w-[240px] flex-shrink-0 border-r border-gray-200 overflow-y-auto">
            <div class="flex justify-between items-center px-3 pt-2">
                <span class="text-gray-400 text-sm font-medium">проекты</span>
                <div class="flex gap-1 items-center">
                    <button onclick="document.getElementById('modal-create-project').classList.remove('hidden')"
                            class="transition-colors p-1 rounded-md hover:bg-gray-100 text-gray-500 hover:text-green-600">
                        <img src="/plus.svg" class="w-5 h-5">
                    </button>
                    <button onclick="document.getElementById('modal-create-project').classList.remove('hidden')"
                            class="transition-colors p-1 rounded-md hover:bg-gray-100 text-gray-500 hover:text-green-600">
                        <img src="/link_plus.svg" class="w-5 h-5">
                    </button>
                </div>
            </div>
            <div th:fragment="projects-list">
                <div id="project-list" class="space-y-1">
                    <th:block th:each="project : ${projects}">
                        <a th:id="'project-item-' + ${project.id}"
                           th:replace="~{fragments/projects :: project-item(project=${project})}"></a>
                    </th:block>
                </div>
            </div>
            <p th:if="${#lists.isEmpty(projects)}" class="px-3 text-gray-500">нет активных проектов</p>
        </div>
        <div class="flex-1 min-w-0 flex flex-col">
            <th:block th:if="${selectedProject != null and selectedProject.id != null}" class="flex-col gap-1">
                <div class="flex-shrink-0 pl-4 pr-4 pt-6 pb-2">
                    <div class="flex gap-1 pl-3 pr-3 items-center justify-between">
                        <div class="flex gap-1 items-center min-w-0">
                            <h2 id="current-project-name" class="text-3xl pr-2 min-w-0 max-w-[600px] truncate" th:text="${selectedProject.name}">ТЕКУЩЕЕ ИМЯ ПРОЕКТА</h2>
                            <button
                                    hx-get="/hx/v1/projects/info"
                                    th:attr="hx-vals='{&quot;projectId&quot;:' + ${selectedProject.id} + '}'"
                                    hx-target="#project-info-content"
                                    hx-trigger="click"
                                    onclick="document.getElementById('modal-info-project').classList.remove('hidden')"
                                    class="w-[36px] pl-2 transition-colors p-1 rounded-md hover:bg-gray-100 text-gray-500 hover:text-green-600">
                                <img src="/info.svg" class="w-5 h-5">
                            </button>
                            <button onclick="document.getElementById('modal-create-column').classList.remove('hidden')" class="w-[36px] pl-2 transition-colors p-1 rounded-md hover:bg-gray-100 text-gray-500 hover:text-green-600">
                                <img src="/column_plus.svg" class="w-5 h-5">
                            </button>
                        </div>
                        <div class="flex gap-2 items-center flex-shrink-0">
                            <button hx-get="/hx/v1/projects/members"
                                    th:attr="hx-vals='{&quot;projectId&quot;:' + ${selectedProject.id} + '}'"
                                    hx-target="#members-modal-content"
                                    hx-trigger="click"
                                    onclick="document.getElementById('modal-members-project').classList.remove('hidden')"
                                    class="w-[36px] h-[36px] transition-colors p-1 rounded-md hover:bg-gray-100 justify-center items-center">
                                <img src="/group.svg" class="w-5 h-5">
                            </button>
                        </div>
                    </div>
                </div>
                <div class="flex gap-7 pl-3 pb-1">
                    <div class="flex gap-1 items-center">
                        <img src="/column.svg" class="w-4 h-4">
                        <label th:insert="~{fragments/columns :: column-counter}"></label>
                    </div>
                    <div class="flex gap-1 items-center">
                        <img src="/note.svg" class="w-4 h-4">
                        <label th:insert="~{fragments/issues :: issue-counter}"></label>
                    </div>
                </div>
                <div class="flex-1 min-h-0 overflow-auto pl-4 pr-4 pb-4">
                    <div th:insert="~{fragments/columns :: columns-list}"></div>
                </div>
            </th:block>
            <div th:if="${selectedProject != null and selectedProject.id == null}" class="p-6 text-gray-600">
                выберите рабочее пространство
            </div>
        </div>
    </div>
    <script>
        function openIssueInfoModal(issueId) {
            htmx.ajax('GET', '/hx/v1/issues/info', {
                target: '#issue-info-content',
                values: { issueId: issueId }
            }).then(() => {
                document.getElementById('modal-info-issue').classList.remove('hidden');
            });
        }
    </script>
</div>
<div th:insert="~{fragments/projects :: info-project-modal}"></div>
<div th:insert="~{fragments/columns :: info-column-modal}"></div>
<div th:insert="~{fragments/issues :: info-issue-modal}"></div>
<div th:insert="~{fragments/projects :: create-project-modal}"></div>
<div th:insert="~{fragments/columns :: create-column-modal}"></div>
<div th:insert="~{fragments/issues :: create-issue-modal}"></div>
<div th:insert="~{fragments/projects :: members-modal}"></div>
</body>
</html>
